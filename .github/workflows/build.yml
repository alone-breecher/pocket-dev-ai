name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Fix Gradle version for Expo 51
        run: |
          cd android
          sed -i 's|gradle-[0-9.]*-all.zip|gradle-8.3-all.zip|g' gradle/wrapper/gradle-wrapper.properties
          sed -i 's|gradle-[0-9.]*-bin.zip|gradle-8.3-bin.zip|g' gradle/wrapper/gradle-wrapper.properties
          cat gradle/wrapper/gradle-wrapper.properties

      - name: Build APK
        run: cd android && ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PocketDevAI-APK
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
